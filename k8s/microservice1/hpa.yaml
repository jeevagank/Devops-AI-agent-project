apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: microservice1
  namespace: microservice1
  labels:
    app: microservice1
    project: telstra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: microservice1
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
