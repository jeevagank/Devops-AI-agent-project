apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - ingress.yaml
  - networkpolicy.yaml

# Override image at deploy time:
#   kustomize edit set image microservice3=<ACCOUNT_ID>.dkr.ecr.ap-southeast-2.amazonaws.com/microservice3:<GIT_SHA>
# Or use --set for Helm:
#   helm upgrade --install microservice3 ./helm/microservice3 \
#     --set image.registry=<ACCOUNT_ID>.dkr.ecr.ap-southeast-2.amazonaws.com \
#     --set image.tag=<GIT_SHA>
images:
  - name: YOUR_AWS_ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/microservice3
    newName: YOUR_AWS_ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com/microservice3
    newTag: DEPLOY_TAG
