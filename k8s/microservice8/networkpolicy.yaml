apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: microservice8
  namespace: microservice8
  labels:
    app: microservice8
    project: telstra
spec:
  podSelector:
    matchLabels:
      app: microservice8
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: microservice8
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: microservice8
      ports:
        - protocol: TCP
          port: 8080
