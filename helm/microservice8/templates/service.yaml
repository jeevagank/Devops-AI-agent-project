# ── Active/Stable Service — receives live traffic ──────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
    project: jeevagan
spec:
  selector:
    app: {{ .Chart.Name }}
    {{- if eq .Values.deployment.strategy "blueGreen" }}
    version: {{ .Values.service.activeColor }}   # switch blue→green here to cut over traffic
    {{- end }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  type: {{ .Values.service.type }}
---
{{- if eq .Values.deployment.strategy "blueGreen" }}
# ── Preview Service — routes to new (green) version for testing before cutover ─
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-preview
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
    project: jeevagan
spec:
  selector:
    app: {{ .Chart.Name }}
    version: {{ .Values.service.previewColor }}  # always points to the inactive color
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  type: {{ .Values.service.type }}
{{- else }}
# ── Canary Service — Argo Rollouts shifts % traffic here during rollout ─────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-canary
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
    project: jeevagan
spec:
  selector:
    app: {{ .Chart.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  type: {{ .Values.service.type }}
{{- end }}
