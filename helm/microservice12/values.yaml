replicaCount: 2

image:
  # Set at deploy time: --set image.registry=<ACCOUNT_ID>.dkr.ecr.ap-southeast-2.amazonaws.com
  registry: ""
  repository: microservice12
  # Must be an immutable tag (git SHA). Never use 'latest'.
  tag: ""
  pullPolicy: IfNotPresent

# ── Deployment Strategy ────────────────────────────────────────────────────────
# Switch between "canary" and "blueGreen" here
deployment:
  strategy: canary   # options: canary | blueGreen
  color: blue        # used for blueGreen only — blue = current live version

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  activeColor: blue    # blueGreen only — controls which color gets live traffic
  previewColor: green  # blueGreen only — preview service always points to inactive color

# ── Canary Steps (used when deployment.strategy = canary) ─────────────────────
rollout:
  canary:
    steps:
      - setWeight: 10        # send 10% traffic to new version
      - pause:
          duration: 5m       # wait 5 min, Prometheus checks success rate
      - setWeight: 30
      - pause:
          duration: 5m
      - setWeight: 60
      - pause:
          duration: 5m
      - setWeight: 100       # fully rolled out

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 70

ingress:
  enabled: true
  host: microservice12.internal.jeevagan.com
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10

env:
  APP_ENV: default
