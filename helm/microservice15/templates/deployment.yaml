apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
    project: jeevagan
    version: {{ .Values.image.tag | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
      version: {{ .Values.deployment.color }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        project: jeevagan
        version: {{ .Values.deployment.color }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ toYaml .Values.containerSecurityContext.capabilities.drop | nindent 16 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: 3
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV | quote }}
      terminationGracePeriodSeconds: 30

  # ── Deployment Strategy ───────────────────────────────────────────────────
  strategy:
    {{- if eq .Values.deployment.strategy "blueGreen" }}
    # Blue-Green: full new version deployed, traffic switched instantly
    blueGreen:
      activeService: {{ .Chart.Name }}           # service receiving live traffic
      previewService: {{ .Chart.Name }}-preview  # service for testing new version before cutover
      autoPromotionEnabled: false                # manual promotion required — prevents accidental cutover
      scaleDownDelaySeconds: 30                  # keep old (blue) pods 30s after cutover for instant rollback
    {{- else }}
    # Canary: gradually shift traffic, auto-rollback on Prometheus metric failure
    canary:
      canaryService: {{ .Chart.Name }}-canary    # service routing canary % traffic
      stableService: {{ .Chart.Name }}           # service routing stable % traffic
      steps:
        {{- toYaml .Values.rollout.canary.steps | nindent 8 }}
      analysis:
        templates:
          - templateName: success-rate
        startingStep: 1
        args:
          - name: service-name
            value: {{ .Chart.Name }}
    {{- end }}
