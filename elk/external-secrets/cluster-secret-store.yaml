# Deploy this into each env's EKS cluster after terraform apply.
# Annotate the external-secrets service account with the IRSA role ARN output:
#   kubectl annotate serviceaccount external-secrets \
#     -n external-secrets \
#     eks.amazonaws.com/role-arn=<eso_irsa_role_arn from terraform output>

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
