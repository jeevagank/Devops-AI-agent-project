input {
  beats {
    port            => 5044
    ssl             => true
    ssl_certificate => "/etc/logstash/certs/logstash.crt"
    ssl_key         => "/etc/logstash/certs/logstash.key"
    ssl_verify_mode => "force_peer"
    ssl_certificate_authorities => ["/etc/logstash/certs/ca.crt"]
  }
}

filter {
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
    mutate {
      rename => {
        "[parsed][level]"     => "log_level"
        "[parsed][msg]"       => "log_message"
        "[parsed][timestamp]" => "log_timestamp"
        "[parsed][trace_id]"  => "trace_id"
        "[parsed][service]"   => "service_name"
      }
    }
  }

  if [kubernetes] {
    mutate {
      add_field => {
        "namespace"  => "%{[kubernetes][namespace]}"
        "pod"        => "%{[kubernetes][pod][name]}"
        "container"  => "%{[kubernetes][container][name]}"
        "node"       => "%{[kubernetes][node][name]}"
      }
    }
  }

  if [request] =~ "/(health|ready|metrics)" {
    drop {}
  }

  # Mask any accidental PII fields
  if [email] {
    mutate { replace => { "email" => "***REDACTED***" } }
  }

  mutate {
    add_field => { "environment" => "prod" }
    remove_field => ["agent", "ecs", "host", "input"]
  }
}

output {
  elasticsearch {
    hosts    => ["https://elasticsearch-prod:9200"]
    index    => "jeevagan-prod-%{namespace}-%{+yyyy.MM.dd}"
    user     => "${ES_USER}"
    password => "${ES_PASSWORD}"
    ssl      => true
    cacert   => "/etc/logstash/certs/ca.crt"
  }
}
