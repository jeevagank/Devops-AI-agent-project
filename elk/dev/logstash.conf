input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON logs from containerised apps
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
    mutate {
      rename => {
        "[parsed][level]"     => "log_level"
        "[parsed][msg]"       => "log_message"
        "[parsed][timestamp]" => "log_timestamp"
        "[parsed][trace_id]"  => "trace_id"
        "[parsed][service]"   => "service_name"
      }
    }
  }

  # Enrich with Kubernetes metadata
  if [kubernetes] {
    mutate {
      add_field => {
        "namespace"  => "%{[kubernetes][namespace]}"
        "pod"        => "%{[kubernetes][pod][name]}"
        "container"  => "%{[kubernetes][container][name]}"
        "node"       => "%{[kubernetes][node][name]}"
      }
    }
  }

  # Drop noisy health check logs
  if [request] =~ "/(health|ready|metrics)" {
    drop {}
  }

  mutate {
    add_field => { "environment" => "dev" }
    remove_field => ["agent", "ecs", "host", "input"]
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch-dev:9200"]
    index    => "jeevagan-dev-%{namespace}-%{+yyyy.MM.dd}"
    user     => "${ES_USER}"
    password => "${ES_PASSWORD}"
  }
}
