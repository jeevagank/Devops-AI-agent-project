# ArgoCD Application manifests with sync policies and health checks
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app1
spec:
  destination:
    namespace: app1
    server: https://kubernetes.default.svc
  source:
    path: app1
    repoURL: https://github.com/your-repo/your-app.git
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  project: your-project
