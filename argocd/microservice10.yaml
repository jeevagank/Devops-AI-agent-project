apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservice10
  namespace: argocd
  labels:
    project: telstra
    microservice: microservice10
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: telstra
  source:
    repoURL: https://github.com/jeevagank/Devops-AI-agent-project.git
    targetRevision: main
    path: helm/microservice10
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: microservice10
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
