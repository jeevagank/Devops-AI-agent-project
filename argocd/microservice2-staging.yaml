apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservice2-staging
  namespace: argocd
  labels:
    project: jeevagan
    microservice: microservice2
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: jeevagan
  source:
    repoURL: https://github.com/jeevagank/Devops-AI-agent-project.git
    targetRevision: main
    path: helm/microservice2
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://staging-jeevagan-eks.ap-southeast-2.eks.amazonaws.com
    namespace: microservice2-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
