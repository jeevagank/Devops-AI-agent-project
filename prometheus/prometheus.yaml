# Prometheus scrape configs
scrape_configs:
  - job_name: 'kubernetes-service-endpoints'
    scrape_interval: 10s
    kubernetes_sd_configs:
    - role: endpoints
      namespaces:
        names:
        - default
        - kube-system
    relabel_configs:
    - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name]
      action: keep
      regex: default;kubernetes
    - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name]
      action: keep
      regex: kube-system;kubernetes
# Alerting rules
groups:
- name: kubernetes.rules
  rules:
  - alert: HighPodCount
    expr: count(up) BY (job) > 10
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: High pod count for job {{ $labels.job }}
