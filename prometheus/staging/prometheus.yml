global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: staging-jeevagan-eks
    env: staging
    region: ap-southeast-2

rule_files:
  - /etc/prometheus/rules/alerting_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager-operated:9093
