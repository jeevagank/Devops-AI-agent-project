alertmanager:
  enabled: true

  config:
    global:
      resolve_timeout: 5m
      slack_api_url: "${SLACK_WEBHOOK_URL}"
      pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

    templates:
      - /etc/alertmanager/config/*.tmpl

    route:
      group_by: ["alertname", "namespace", "env"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack-staging-warning
      routes:
        - matchers:
            - severity = critical
          receiver: pagerduty-staging-critical
          continue: true
        - matchers:
            - severity = critical
          receiver: slack-staging-critical
          continue: false
        - matchers:
            - severity = warning
          receiver: slack-staging-warning
          continue: false

    receivers:
      - name: slack-staging-warning
        slack_configs:
          - channel: "#alerts-staging"
            username: "Prometheus Staging"
            icon_emoji: ":warning:"
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: |
              *Env:* staging
              *Alert:* {{ .CommonLabels.alertname }}
              *Severity:* {{ .CommonLabels.severity }}
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

      - name: slack-staging-critical
        slack_configs:
          - channel: "#alerts-staging-critical"
            username: "Prometheus Staging"
            icon_emoji: ":fire:"
            send_resolved: true
            title: '[CRITICAL] {{ .CommonLabels.alertname }}'
            text: |
              *Env:* staging
              *Alert:* {{ .CommonLabels.alertname }}
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

      - name: pagerduty-staging-critical
        pagerduty_configs:
          - routing_key: "${PAGERDUTY_STAGING_KEY}"
            severity: critical
            description: '{{ .CommonLabels.alertname }} — {{ .CommonAnnotations.summary }}'
            details:
              env: staging
              cluster: staging-jeevagan-eks
              description: '{{ .CommonAnnotations.description }}'

    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ["alertname", "namespace"]

  alertmanagerSpec:
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
