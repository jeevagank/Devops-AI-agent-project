alertmanager:
  enabled: true

  config:
    global:
      resolve_timeout: 5m
      slack_api_url: "${SLACK_WEBHOOK_URL}"

    templates:
      - /etc/alertmanager/config/*.tmpl

    route:
      group_by: ["alertname", "namespace", "env"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack-dev-warning
      routes:
        - matchers:
            - severity = critical
          receiver: slack-dev-critical
          continue: false
        - matchers:
            - severity = warning
          receiver: slack-dev-warning
          continue: false

    receivers:
      - name: slack-dev-warning
        slack_configs:
          - channel: "#alerts-dev"
            username: "Prometheus Dev"
            icon_emoji: ":warning:"
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: |
              *Env:* dev
              *Alert:* {{ .CommonLabels.alertname }}
              *Severity:* {{ .CommonLabels.severity }}
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

      - name: slack-dev-critical
        slack_configs:
          - channel: "#alerts-dev-critical"
            username: "Prometheus Dev"
            icon_emoji: ":fire:"
            send_resolved: true
            title: '[CRITICAL] {{ .CommonLabels.alertname }}'
            text: |
              *Env:* dev
              *Alert:* {{ .CommonLabels.alertname }}
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ["alertname", "namespace"]

  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
