groups:

  - name: node.rules
    rules:
      - alert: NodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} is not ready"
          description: "Node {{ $labels.node }} has been not ready for more than 2 minutes."

      - alert: NodeHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on node {{ $labels.instance }}"
          description: "Node {{ $labels.instance }} CPU usage is {{ $value | printf \"%.1f\" }}% (threshold: 85%)."

      - alert: NodeHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on node {{ $labels.instance }}"
          description: "Node {{ $labels.instance }} memory usage is {{ $value | printf \"%.1f\" }}% (threshold: 85%)."

      - alert: NodeDiskPressure
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk pressure on node {{ $labels.instance }}"
          description: "Node {{ $labels.instance }} disk usage is {{ $value | printf \"%.1f\" }}% (threshold: 80%)."

  - name: pod.rules
    rules:
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value | printf \"%.0f\" }} times in the last 15 minutes."

      - alert: PodNotReady
        expr: kube_pod_status_ready{condition="true"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for more than 5 minutes."

      - alert: PodHighCPU
        expr: sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (namespace, pod) / sum(kube_pod_container_resource_limits{resource="cpu"}) by (namespace, pod) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} high CPU"
          description: "Pod {{ $labels.pod }} is using {{ $value | printf \"%.1f\" }}% of its CPU limit."

      - alert: PodHighMemory
        expr: sum(container_memory_working_set_bytes{container!=""}) by (namespace, pod) / sum(kube_pod_container_resource_limits{resource="memory"}) by (namespace, pod) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} high memory"
          description: "Pod {{ $labels.pod }} is using {{ $value | printf \"%.1f\" }}% of its memory limit."

      - alert: PodOOMKilled
        expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} OOMKilled"
          description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was OOMKilled."

  - name: deployment.rules
    rules:
      - alert: DeploymentReplicasMismatch
        expr: kube_deployment_spec_replicas != kube_deployment_status_available_replicas
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"
          description: "Deployment {{ $labels.deployment }} has {{ $value }} available replicas, expected {{ $labels.spec_replicas }}."

      - alert: HpaMaxedOut
        expr: kube_horizontalpodautoscaler_status_current_replicas == kube_horizontalpodautoscaler_spec_max_replicas
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "HPA {{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }} at max replicas"
          description: "HPA {{ $labels.horizontalpodautoscaler }} has been at max replicas for 10 minutes — consider increasing maxReplicas."

  - name: microservice.rules
    rules:
      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (namespace, service) / sum(rate(http_requests_total[5m])) by (namespace, service) * 100 > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.namespace }}/{{ $labels.service }}"
          description: "Service {{ $labels.service }} error rate is {{ $value | printf \"%.1f\" }}% (threshold: 5%)."

      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, namespace, service)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.namespace }}/{{ $labels.service }}"
          description: "Service {{ $labels.service }} p99 latency is {{ $value | printf \"%.2f\" }}s (threshold: 2s)."

  - name: msk.rules
    rules:
      - alert: KafkaConsumerLag
        expr: kafka_consumergroup_lag_sum > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag on group {{ $labels.consumergroup }}"
          description: "Consumer group {{ $labels.consumergroup }} on topic {{ $labels.topic }} has a lag of {{ $value | printf \"%.0f\" }} messages (threshold: 10000). MSK cluster: {{ $labels.cluster }}."

      - alert: KafkaConsumerLagCritical
        expr: kafka_consumergroup_lag_sum > 50000
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical Kafka consumer lag on group {{ $labels.consumergroup }}"
          description: "Consumer group {{ $labels.consumergroup }} on topic {{ $labels.topic }} has a lag of {{ $value | printf \"%.0f\" }} messages (threshold: 50000). Consumers may be stalled."

      - alert: KafkaConsumerGroupNotConsuming
        expr: delta(kafka_consumergroup_lag_sum[10m]) > 0 and kafka_consumergroup_lag_sum > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Kafka consumer group {{ $labels.consumergroup }} is not making progress"
          description: "Consumer group {{ $labels.consumergroup }} lag is growing on topic {{ $labels.topic }} — consumers may be down or stuck."

  - name: aurora.rules
    rules:
      - alert: AuroraReplicationLag
        expr: aws_rds_aurora_replica_lag_average > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Aurora replication lag on {{ $labels.dbinstance_identifier }}"
          description: "Aurora replica {{ $labels.dbinstance_identifier }} replication lag is {{ $value | printf \"%.0f\" }}ms (threshold: 1000ms). DR recovery point may be impacted."

      - alert: AuroraReplicationLagCritical
        expr: aws_rds_aurora_replica_lag_average > 5000
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical Aurora replication lag on {{ $labels.dbinstance_identifier }}"
          description: "Aurora replica {{ $labels.dbinstance_identifier }} replication lag is {{ $value | printf \"%.0f\" }}ms (threshold: 5000ms). Global DB DR failover RPO is at risk."

      - alert: AuroraGlobalDbReplicationLag
        expr: aws_rds_aurora_global_db_replication_lag_milliseconds > 2000
        for: 5m
        labels:
          severity: critical
          region: ap-southeast-1
        annotations:
          summary: "Aurora Global DB cross-region replication lag"
          description: "Aurora Global DB replication lag to DR region (ap-southeast-1 Singapore) is {{ $value | printf \"%.0f\" }}ms (threshold: 2000ms). RTO/RPO targets for Sydney→Singapore DR may be breached."
