# Create a network policy for each microservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: my-microservice
spec:
  podSelector:
    matchLabels:
      app: my-microservice
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: my-microservice
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: my-microservice
