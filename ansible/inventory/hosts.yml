all:
  children:
    jenkins:
      hosts:
        jenkins_controller:
          # No SSH — Ansible connects via AWS Systems Manager Session Manager
          ansible_connection: community.aws.aws_ssm
          ansible_aws_ssm_region: ap-southeast-2
          # Instance ID output from Terraform: terraform output jenkins_instance_id
          ansible_aws_ssm_instance_id: "{{ lookup('env', 'JENKINS_INSTANCE_ID') }}"
